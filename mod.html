<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Bookings</title>
 
<style>
 
body {
    background: #111;
    color: white;
    font-family: Arial;
    padding: 40px;
}
 
h1 {
    text-align: center;
    color: #e77d20;
}
 
.card {
  background: rgb(23, 21, 21);
  border: 1px solid #ddd;
  border-radius: 10px;
  padding: 15px;
  margin: 10px;
  width: 200px;
  display: inline-block;
 
  /* ✦ ADDED */
  position: relative;
  vertical-align: top;
  transition: opacity 0.3s, transform 0.3s;
}
 
.card h3 {
  margin-bottom: 8px;
  /* ✦ ADDED: leave room so text doesn't go under the X */
  padding-right: 22px;
}
 
.card p {
  color: gray;
  font-size: 14px;
}
 
/* ✦ ADDED: cancel (X) button */
.cancel-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 22px;
  height: 22px;
  background: rgba(255, 60, 60, 0.12);
  border: 1px solid rgba(255, 60, 60, 0.35);
  border-radius: 50%;
  color: #ff6b6b;
  font-size: 13px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
 
.cancel-btn:hover {
  background: rgba(255, 60, 60, 0.28);
  border-color: #ff4d4d;
  transform: rotate(90deg) scale(1.15);
}
 
/* ✦ ADDED: confirmation popup overlay */
#confirmOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
  z-index: 9999;
  align-items: center;
  justify-content: center;
}
 
#confirmOverlay.show {
  display: flex;
}
 
#confirmBox {
  background: #1a1a1a;
  border: 1px solid #e77d20;
  border-radius: 14px;
  padding: 32px 30px 24px;
  width: 90%;
  max-width: 360px;
  text-align: center;
  position: relative;
  animation: popIn 0.25s ease;
}
 
/* orange top line on popup */
#confirmBox::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #e77d20, transparent);
  border-radius: 14px 14px 0 0;
}
 
@keyframes popIn {
  from { opacity: 0; transform: scale(0.88); }
  to   { opacity: 1; transform: scale(1); }
}
 
#confirmBox .icon {
  font-size: 36px;
  margin-bottom: 12px;
}
 
#confirmBox h3 {
  color: #fff;
  font-size: 17px;
  margin-bottom: 8px;
  font-family: Arial;
}
 
#confirmBox p {
  color: #888;
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.5;
}
 
.confirm-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}
 
.btn-keep {
  background: none;
  border: 1px solid #444;
  color: #aaa;
  padding: 9px 24px;
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
 
.btn-keep:hover {
  border-color: #888;
  color: #fff;
}
 
.btn-cancel-confirm {
  background: #c0392b;
  border: none;
  color: #fff;
  padding: 9px 24px;
  border-radius: 7px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}
 
.btn-cancel-confirm:hover {
  background: #e74c3c;
  box-shadow: 0 0 14px rgba(231,76,60,0.4);
}
 
/* ✦ ADDED: empty state message */
#emptyMsg {
  display: none;
  text-align: center;
  color: #555;
  font-size: 14px;
  margin-top: 40px;
  letter-spacing: 1px;
}
 
</style>
 
</head>
 
<body>
 
<h1>My Bookings 🚗</h1>
 
<div class="container" id="container">
 
  <!-- static sample cards -->
  <div class="card">
    <button class="cancel-btn" onclick="askCancel(this)" title="Cancel booking">✕</button>
    <h3>Rahul Sharma</h3>
    <p>🚗 Thar</p>
    <p>📍 Delhi</p>
  </div>
 
  <div class="card">
    <button class="cancel-btn" onclick="askCancel(this)" title="Cancel booking">✕</button>
    <h3>Aditi Verma</h3>
    <p>🚗 Fortuner</p>
    <p>📍 Mumbai</p>
  </div>
 
  <div class="card">
    <button class="cancel-btn" onclick="askCancel(this)" title="Cancel booking">✕</button>
    <h3>Karan Mehta</h3>
    <p>🚗 Jeep Wrangler</p>
    <p>📍 Chandigarh</p>
  </div>
 
</div>
 
<p id="emptyMsg">No bookings found.</p>
 
<!-- ✦ CONFIRMATION POPUP -->
<div id="confirmOverlay">
  <div id="confirmBox">
    <div class="icon">⚠️</div>
    <h3>Cancel Booking?</h3>
    <p>Are you sure you want to cancel this booking?<br>This action cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn-keep" onclick="closeConfirm()">Keep It</button>
      <button class="btn-cancel-confirm" onclick="confirmCancel()">Yes, Cancel</button>
    </div>
  </div>
</div>
 
<script>
 
// ── LOAD SAVED BOOKINGS FROM LOCALSTORAGE ──
let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
let container = document.getElementById("container");
 
bookings.forEach((b, index) => {
  let div = document.createElement("div");
  div.classList.add("card");
  div.dataset.index = index; // store index to delete from localStorage
 
  div.innerHTML = `
    <button class="cancel-btn" onclick="askCancel(this)" title="Cancel booking">✕</button>
    <h3>${b.name}</h3>
    <p>🚗 ${b.car}</p>
    <p>📍 ${b.city}</p>
  `;
 
  container.appendChild(div);
});
 
// ── CANCEL LOGIC ──
let cardToRemove = null;
 
function askCancel(btn) {
  cardToRemove = btn.closest(".card");
  document.getElementById("confirmOverlay").classList.add("show");
}
 
function closeConfirm() {
  document.getElementById("confirmOverlay").classList.remove("show");
  cardToRemove = null;
}
 
function confirmCancel() {
  if (!cardToRemove) return;
 
  // if it's a localStorage booking (has data-index), remove from storage
  const idx = cardToRemove.dataset.index;
  if (idx !== undefined) {
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    bookings.splice(Number(idx), 1);
    localStorage.setItem("bookings", JSON.stringify(bookings));
  }
 
  // animate card out
  cardToRemove.style.opacity = "0";
  cardToRemove.style.transform = "scale(0.85)";
  setTimeout(() => {
    cardToRemove.remove();
    cardToRemove = null;
    checkEmpty();
  }, 300);
 
  closeConfirm();
}
 
// close popup if user clicks outside the box
document.getElementById("confirmOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeConfirm();
});
 
function checkEmpty() {
  const remaining = document.querySelectorAll(".card");
  document.getElementById("emptyMsg").style.display = remaining.length === 0 ? "block" : "none";
}
 
</script>
 
</body>
</html>
